<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guardian AI</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div>
          <h1>GuardianAI</h1>
          <p class="subtitle">Phishing Protection</p>
        </div>
      </div>
      <div class="status-indicator" id="statusIndicator">
        <span class="status-dot"></span>
        <span class="status-text">Scanning...</span>
      </div>
    </div>

    <!-- Current URL -->
    <div class="url-section">
      <div class="url-label">Current Website</div>
      <div class="url-display" id="currentUrl">Loading...</div>
    </div>

    <!-- Risk Score -->
    <div class="risk-section" id="riskSection">
      <div class="risk-header">
        <span class="risk-label">Risk Score</span>
        <span class="risk-value" id="riskValue">--</span>
      </div>
      <div class="risk-meter">
        <div class="risk-meter-fill" id="riskMeterFill"></div>
      </div>
      <div class="risk-level" id="riskLevel">Analyzing...</div>
    </div>

    <!-- Classification -->
    <div class="classification-section" id="classificationSection" style="display: none;">
      <div class="classification-badge" id="classificationBadge">
        <svg class="badge-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="12" y1="9" x2="12" y2="13" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="12" y1="17" x2="12.01" y2="17" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span id="classificationText">Unknown</span>
      </div>
    </div>

    <!-- Explanation -->
    <div class="explanation-section" id="explanationSection" style="display: none;">
      <div class="explanation-header">
        <svg class="brain-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>AI Analysis</span>
      </div>
      <ul class="explanation-list" id="explanationList"></ul>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button class="btn btn-primary" id="rescanBtn">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Rescan
      </button>
      <button class="btn btn-secondary" id="dashboardBtn">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <rect x="3" y="3" width="7" height="7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <rect x="14" y="3" width="7" height="7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <rect x="14" y="14" width="7" height="7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <rect x="3" y="14" width="7" height="7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Dashboard
      </button>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
      <p>Analyzing website...</p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
